name: Release Debian Package

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-publish-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Derive package version from release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"

          if [[ -z "$VERSION" ]]; then
            echo "Release tag produced an empty package version" >&2
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "deb_name=kpanel-client_${VERSION}_all.deb" >> "$GITHUB_OUTPUT"

      - name: Build Debian package
        shell: bash
        run: |
          set -euo pipefail
          cd client-system
          ./scripts/build_deb.sh "${{ steps.version.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.deb_name }}
          path: client-system/build/${{ steps.version.outputs.deb_name }}

      - name: Attach Debian package to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: client-system/build/${{ steps.version.outputs.deb_name }}

      - name: Check out external package repository
        uses: actions/checkout@v4
        with:
          repository: KumpeWeb/repo
          ref: master
          path: external-repo
          token: ${{ secrets.KUMPEWEB_REPO_TOKEN }}

      - name: Copy package into external pool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p external-repo/pool/kumpeserver
          cp "client-system/build/${{ steps.version.outputs.deb_name }}" \
            "external-repo/pool/kumpeserver/${{ steps.version.outputs.deb_name }}"

      - name: Commit and push external pool update
        shell: bash
        run: |
          set -euo pipefail
          cd external-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "pool/kumpeserver/${{ steps.version.outputs.deb_name }}"

          if git diff --cached --quiet; then
            echo "No external repository changes to commit"
            exit 0
          fi

          git commit -m "Add kpanel-client ${{ steps.version.outputs.version }}"
          git push origin master