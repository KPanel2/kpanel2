name: Build Raspberry Pi Appliance Image

on:
  push:
  workflow_dispatch:
    inputs:
      image_name:
        description: Image base name
        required: false
        default: kpanel-appliance
      package_version:
        description: kpanel-client package version (without v prefix)
        required: false
        default: 0.1.0
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONFIG_BLOB: ${{ secrets.RCLONE_CONFIG }}
      RCLONE_REMOTE_PATH: ${{ secrets.RCLONE_REMOTE_PATH }}
      HAS_RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG != '' }}
      HAS_RCLONE_REMOTE_PATH: ${{ secrets.RCLONE_REMOTE_PATH != '' }}

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Resolve package version
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_NAME="kpanel-appliance"
          VERSION="0.1.0~git${GITHUB_SHA::7}"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.package_version }}"
            IMAGE_NAME="${{ github.event.inputs.image_name || 'kpanel-appliance' }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build kpanel-client deb package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x client-system/scripts/build_deb.sh
          client-system/scripts/build_deb.sh "${{ steps.vars.outputs.version }}"

      - name: Prepare custom pi-gen stage payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p client-system/image/pi-gen/stage-kpanel/00-files/usr/local/src
          cp "client-system/build/kpanel-client_${{ steps.vars.outputs.version }}_all.deb" \
             "client-system/image/pi-gen/stage-kpanel/00-files/usr/local/src/kpanel-client.deb"

      - name: Clone pi-gen
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 --branch bookworm --single-branch https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen

      - name: Install pi-gen build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            quilt \
            debootstrap \
            libarchive-tools \
            arch-test \
            binfmt-support \
            qemu-user-static \
            xz-utils \
            curl \
            rclone \
            rsync

      - name: Inject KPanel custom stage
        shell: bash
        run: |
          set -euo pipefail
          cp -r client-system/image/pi-gen/stage-kpanel /tmp/pi-gen/
          chmod +x /tmp/pi-gen/stage-kpanel/00-run-chroot.sh

      - name: Configure pi-gen
        shell: bash
        run: |
          set -euo pipefail
          cat >/tmp/pi-gen/config <<'EOF' | sed 's/^[[:space:]]*//'
          IMG_NAME='${{ steps.vars.outputs.image_name }}'
          RELEASE='bookworm'
          TARGET_HOSTNAME='kpanel'
          FIRST_USER_NAME='pi'
          FIRST_USER_PASS='kpanel'
          DISABLE_FIRST_BOOT_USER_RENAME=1
          ENABLE_SSH=1
          DEPLOY_ZIP=0
          STAGE_LIST='stage0 stage1 stage2 stage3 stage-kpanel'
          EOF

      - name: Verify Docker runtime
        shell: bash
        run: |
          set -euo pipefail
          docker version

      - name: Register ARM binfmt handlers
        shell: bash
        run: |
          set -euo pipefail
          sudo modprobe binfmt_misc || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc || true
          sudo update-binfmts --enable qemu-arm || true
          sudo update-binfmts --enable qemu-aarch64 || true

          if ! command -v qemu-arm >/dev/null 2>&1 && command -v qemu-arm-static >/dev/null 2>&1; then
            sudo ln -sf "$(command -v qemu-arm-static)" /usr/local/bin/qemu-arm
          fi
          if ! command -v qemu-aarch64 >/dev/null 2>&1 && command -v qemu-aarch64-static >/dev/null 2>&1; then
            sudo ln -sf "$(command -v qemu-aarch64-static)" /usr/local/bin/qemu-aarch64
          fi

          docker run --rm --privileged tonistiigi/binfmt --install arm,arm64

      - name: Verify binfmt registration
        shell: bash
        run: |
          set -euo pipefail
          command -v qemu-arm
          command -v qemu-aarch64
          test -e /proc/sys/fs/binfmt_misc/qemu-arm
          test -e /proc/sys/fs/binfmt_misc/qemu-aarch64

      - name: Build image with pi-gen (Docker)
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/pi-gen

          attempts=3
          fallback_configured=0
          for attempt in $(seq 1 "$attempts"); do
            echo "pi-gen build attempt ${attempt}/${attempts}"
            if sudo ./build-docker.sh; then
              echo "pi-gen build succeeded on attempt ${attempt}"
              exit 0
            fi

            if [[ "$fallback_configured" -eq 0 ]] && grep -R -q "Couldn't download package" /tmp/pi-gen/work/*/stage0/debootstrap.log 2>/dev/null; then
              echo "Detected transient package download failure; enabling fallback mirrors"
              printf "%s\n" "RASPBIAN_MIRROR='http://archive.raspbian.org/raspbian/'" >> /tmp/pi-gen/config
              printf "%s\n" "DEBIAN_MIRROR='http://deb.debian.org/debian/'" >> /tmp/pi-gen/config
              fallback_configured=1
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "pi-gen build failed; cleaning work/deploy and retrying"
              sudo rm -rf /tmp/pi-gen/work /tmp/pi-gen/deploy
            fi
          done

          echo "pi-gen build failed after ${attempts} attempts" >&2
          exit 1

      - name: Smoke test image runtime helpers
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=/tmp/pi-gen/deploy
          IMG_PATH="$(find "$DEPLOY_DIR" -maxdepth 1 -type f -name '*.img' | sort | tail -n 1)"

          if [[ -z "${IMG_PATH}" ]]; then
            echo "No .img artifact found under $DEPLOY_DIR" >&2
            exit 1
          fi

          MOUNT_DIR=/mnt/kpanel-smoke
          LOOPDEV=""

          cleanup() {
            set +e
            sudo umount "$MOUNT_DIR/proc" >/dev/null 2>&1 || true
            sudo umount "$MOUNT_DIR" >/dev/null 2>&1 || true
            if [[ -n "$LOOPDEV" ]]; then
              sudo losetup -d "$LOOPDEV" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          LOOPDEV="$(sudo losetup --find --show --partscan "$IMG_PATH")"
          sudo mkdir -p "$MOUNT_DIR"
          sudo mount "${LOOPDEV}p2" "$MOUNT_DIR"
          sudo mount -t proc proc "$MOUNT_DIR/proc"

          sudo install -m 0755 /usr/bin/qemu-arm-static "$MOUNT_DIR/usr/bin/qemu-arm-static"
          sudo chroot "$MOUNT_DIR" /bin/bash -n /usr/local/bin/kpanel-set-mode
          sudo chroot "$MOUNT_DIR" /bin/bash -lc '/usr/local/bin/kpanel-set-mode dev && grep -q "^KPANEL_ENV_MODE=dev$" /etc/default/kpanel-client'

          echo "Image smoke test passed: kpanel-set-mode runs successfully"

      - name: Shrink, compress, and checksum image artifact
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=/tmp/pi-gen/deploy
          IMG_PATH="$(find "$DEPLOY_DIR" -maxdepth 1 -type f -name '*.img' | sort | tail -n 1)"

          if [[ -z "${IMG_PATH}" ]]; then
            echo "No .img artifact found under $DEPLOY_DIR" >&2
            ls -la "$DEPLOY_DIR" || true
            exit 1
          fi

          PISHRINK=/tmp/pishrink.sh
          curl -fsSL https://raw.githubusercontent.com/Drewsif/PiShrink/master/pishrink.sh -o "$PISHRINK"
          chmod +x "$PISHRINK"

          sudo "$PISHRINK" "$IMG_PATH"
          sudo chown -R "$(id -u):$(id -g)" "$DEPLOY_DIR"

          OUTPUT_PREFIX="${{ steps.vars.outputs.image_name }}-${{ steps.vars.outputs.version }}"
          XZ_PATH="$DEPLOY_DIR/${OUTPUT_PREFIX}-flashable.img.xz"

          RAW_BYTES="$(stat -c '%s' "$IMG_PATH")"

          # Use broadly compatible XZ settings for Etcher/Raspberry Pi Imager.
          xz \
            --threads=0 \
            --compress \
            --stdout \
            --check=crc32 \
            -9 \
            "$IMG_PATH" > "$XZ_PATH"

          xz -t "$XZ_PATH"

          XZ_BYTES="$(stat -c '%s' "$XZ_PATH")"
          RATIO="$(awk -v raw="$RAW_BYTES" -v xz="$XZ_BYTES" 'BEGIN { if (raw == 0) print "0.00"; else printf "%.2f", (xz / raw) * 100 }')"

          sha256sum "$XZ_PATH" > "$XZ_PATH.sha256"

          echo "Compressed artifact details:"
          ls -lh "$XZ_PATH" "$XZ_PATH.sha256"
          echo "Raw image bytes: $RAW_BYTES"
          echo "Compressed bytes: $XZ_BYTES"
          echo "Compressed size is ${RATIO}% of raw image"

      - name: Build PiServer archive artifact
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=/tmp/pi-gen/deploy
          IMG_PATH="$(find "$DEPLOY_DIR" -maxdepth 1 -type f -name '*.img' | sort | tail -n 1)"

          if [[ -z "${IMG_PATH}" ]]; then
            echo "No .img artifact found under $DEPLOY_DIR" >&2
            exit 1
          fi

          PISERVER_DIR=/tmp/piserver-tools
          ROOTFS_DIR=/tmp/piserver-rootfs
          MOUNT_DIR=/mnt/kpanel-root
          BOOT_DIR=$MOUNT_DIR/boot
          LOOPDEV=""

          cleanup() {
            set +e
            sudo umount "$BOOT_DIR" >/dev/null 2>&1 || true
            sudo umount "$MOUNT_DIR" >/dev/null 2>&1 || true
            if [[ -n "$LOOPDEV" ]]; then
              sudo losetup -d "$LOOPDEV" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          rm -rf "$PISERVER_DIR" "$ROOTFS_DIR"
          mkdir -p "$PISERVER_DIR" "$ROOTFS_DIR"

          curl -fsSL https://raw.githubusercontent.com/raspberrypi/piserver/master/scripts/convert_folder.sh -o "$PISERVER_DIR/convert_folder.sh"
          curl -fsSL https://raw.githubusercontent.com/raspberrypi/piserver/master/scripts/convert_chrooted_cmds -o "$PISERVER_DIR/convert_chrooted_cmds"
          chmod +x "$PISERVER_DIR/convert_folder.sh"
          chmod +x "$PISERVER_DIR/convert_chrooted_cmds"

          LOOPDEV="$(sudo losetup --find --show --partscan "$IMG_PATH")"
          sudo mkdir -p "$MOUNT_DIR" "$BOOT_DIR"
          sudo mount "${LOOPDEV}p2" "$MOUNT_DIR"
          sudo mount "${LOOPDEV}p1" "$BOOT_DIR"

          sudo rsync -aHAX --numeric-ids "$MOUNT_DIR/" "$ROOTFS_DIR/"
          sudo chown -R "$(id -u):$(id -g)" "$ROOTFS_DIR"

          sudo "$PISERVER_DIR/convert_folder.sh" "$ROOTFS_DIR"
          sudo chown -R "$(id -u):$(id -g)" "$ROOTFS_DIR"

          OUTPUT_PREFIX="${{ steps.vars.outputs.image_name }}-${{ steps.vars.outputs.version }}"
          PISERVER_TAR="$DEPLOY_DIR/${OUTPUT_PREFIX}-piserver-rootfs.tar.xz"
          bsdtar -C "$ROOTFS_DIR" --numeric-owner --one-file-system -cJf "$PISERVER_TAR" .
          sha256sum "$PISERVER_TAR" > "$PISERVER_TAR.sha256"

          echo "PiServer artifact details:"
          ls -lh "$PISERVER_TAR" "$PISERVER_TAR.sha256"

      - name: Report mirror upload configuration
        shell: bash
        run: |
          set -euo pipefail
          echo "RCLONE_CONFIG present: $HAS_RCLONE_CONFIG"
          echo "RCLONE_REMOTE_PATH present: $HAS_RCLONE_REMOTE_PATH"
          if [[ "$HAS_RCLONE_CONFIG" != "true" || "$HAS_RCLONE_REMOTE_PATH" != "true" ]]; then
            echo "rclone mirror upload will be skipped because required secrets are missing"
          else
            echo "rclone mirror upload is enabled"
          fi

      - name: Upload compressed artifacts via rclone
        if: ${{ env.HAS_RCLONE_CONFIG == 'true' && env.HAS_RCLONE_REMOTE_PATH == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=/tmp/pi-gen/deploy
          mapfile -t FILES < <(find "$DEPLOY_DIR" -maxdepth 1 -type f \( -name '*-flashable.img.xz' -o -name '*-flashable.img.xz.sha256' -o -name '*-piserver-rootfs.tar.xz' -o -name '*-piserver-rootfs.tar.xz.sha256' \) | sort)

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "No compressed artifacts found for rclone upload" >&2
            exit 1
          fi

          mkdir -p "$HOME/.config/rclone"
          printf '%s\n' "$RCLONE_CONFIG_BLOB" > "$HOME/.config/rclone/rclone.conf"

          echo "Uploading files to $RCLONE_REMOTE_PATH"
          printf ' - %s\n' "${FILES[@]}"

          rclone mkdir "$RCLONE_REMOTE_PATH"
          rclone copy "$DEPLOY_DIR" "$RCLONE_REMOTE_PATH" \
            --include "*-flashable.img.xz" \
            --include "*-flashable.img.xz.sha256" \
            --include "*-piserver-rootfs.tar.xz" \
            --include "*-piserver-rootfs.tar.xz.sha256" \
            --progress \
            --stats-one-line

          echo "rclone upload completed to $RCLONE_REMOTE_PATH"

      - name: Dump debootstrap diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if ls /tmp/pi-gen/work/*/stage0/debootstrap.log >/dev/null 2>&1; then
            for f in /tmp/pi-gen/work/*/stage0/debootstrap.log; do
              echo "----- $f -----"
              tail -n 200 "$f" || true
            done
          else
            echo "No debootstrap logs found under /tmp/pi-gen/work"
          fi

      - name: Upload appliance image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.image_name }}-${{ steps.vars.outputs.version }}
          path: |
            /tmp/pi-gen/deploy/*-flashable.img.xz
            /tmp/pi-gen/deploy/*-flashable.img.xz.sha256
            /tmp/pi-gen/deploy/*-piserver-rootfs.tar.xz
            /tmp/pi-gen/deploy/*-piserver-rootfs.tar.xz.sha256

      - name: Attach image artifacts to GitHub release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/pi-gen/deploy/*-flashable.img.xz
            /tmp/pi-gen/deploy/*-flashable.img.xz.sha256
            /tmp/pi-gen/deploy/*-piserver-rootfs.tar.xz
            /tmp/pi-gen/deploy/*-piserver-rootfs.tar.xz.sha256
